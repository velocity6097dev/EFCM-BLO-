<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bahar Service Station</title>
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="login-bg">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-circle">BSS</div>
                <h2>Welcome Back</h2>
                <p>Bahar Service Station Portal</p>
            </div>
            
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <button type="button" class="eye-btn" onclick="togglePassword()" title="Show/Hide Password">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="options-group">
                <label class="remember-container">
                    <input type="checkbox" id="rememberMe">
                    Remember me
                </label>
            </div>

            <button class="btn-login" onclick="login()">Log In</button>
            <p id="error-msg" class="error-message" style="display: none;"></p>
        </div>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
