<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Bahar Service Station</title>
    <link href="/css/global.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .block-list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid var(--border-light);
        }
        .block-list-item:last-child { border-bottom: none; }
        .block-info { display: flex; flex-direction: column; gap: 4px; }
        .block-info strong { color: var(--danger-dark); font-size: 1.05rem; }
        .block-info span { color: var(--text-muted); font-size: 0.85rem; }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <button class="mobile-toggle" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
            <i data-lucide="fuel" style="color: var(--primary); width: 28px; height: 28px;"></i>
            <h1 style="display: inline-block;">BAHAR SERVICE STATION</h1>
            <span id="roleBadge" class="badge badge-info" style="margin-left:10px;"></span>
        </div>
        <button onclick="logout()" class="btn-danger"><i data-lucide="log-out"></i> Logout</button>
    </header>
    
    <div class="app-body">
        <nav class="sidebar" id="appSidebar">
            <a href="/single.html"><i data-lucide="file-plus-2"></i> Single Entry</a>
            <a href="/batch.html"><i data-lucide="layers"></i> Batch Entry (50)</a>
            <a href="/summary.html"><i data-lucide="list-checks"></i> View Bills & Integrity</a>
            <a href="/invoices.html"><i data-lucide="receipt"></i> Invoices</a>
            <!-- Admin is active! -->
            <a href="/admin.html" class="active" id="adminTabBtn"><i data-lucide="settings"></i> Admin Panel</a>
        </nav>

        <main class="content">
            <h2><i data-lucide="settings" style="vertical-align: -3px; color: var(--text-muted);"></i> Admin Settings & Blocks</h2>
            
            <div style="display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: flex-start;">
                <!-- Left Column: Settings & Blocking -->
                <div style="flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 1.5rem;">
                    
                    <!-- NEW: Daily Price Settings -->
                    <div class="card" style="margin-bottom: 0;">
                        <h3 style="margin-top: 0; display: flex; align-items: center; gap: 8px;">
                            <i data-lucide="indian-rupee" style="color: var(--success);"></i> Daily Price Settings
                        </h3>
                        <div style="display: flex; flex-direction: column; gap: 1rem;">
                            <div>
                                <label>Date</label>
                                <input type="date" id="priceDate">
                            </div>
                            <div>
                                <label>Product</label>
                                <select id="priceProduct">
                                    <option value="Diesel">Diesel</option>
                                    <option value="Petrol">Petrol</option>
                                    <option value="Lubricant">Lubricant</option>
                                </select>
                            </div>
                            <div>
                                <label>Rate (per Ltr/Unit)</label>
                                <input type="number" step="0.01" id="priceRate" placeholder="e.g. 89.90">
                            </div>
                            <button onclick="setDailyPrice()" class="btn-primary mt-1">
                                <i data-lucide="save"></i> Save Price
                            </button>
                        </div>
                    </div>

                    <div class="card" style="margin-bottom: 0;">
                        <h3 style="margin-top: 0; display: flex; align-items: center; gap: 8px;">
                            <i data-lucide="gavel" style="color: var(--primary);"></i> Election Mode
                        </h3>
                        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px;">Forces "Vehicle No" to be mandatory for all bill entries across the system.</p>
                        <select id="electionMode" onchange="updateSetting('election_mode', this.value)">
                            <option value="false">OFF (Normal Mode)</option>
                            <option value="true">ON (Election Mode)</option>
                        </select>
                    </div>

                    <div class="card" style="margin-bottom: 0;">
                        <h3 style="margin-top: 0; display: flex; align-items: center; gap: 8px;">
                            <i data-lucide="ban" style="color: var(--danger);"></i> Block Entity
                        </h3>
                        <div style="display: flex; flex-direction: column; gap: 1rem;">
                            <div>
                                <label>Target (Bill No or Vehicle No)</label>
                                <input type="text" id="blockValue" placeholder="e.g. WB-11-2222 or 1050">
                            </div>
                            <div>
                                <label>Block Type</label>
                                <select id="blockType">
                                    <option value="VEHICLE_NO">Vehicle No</option>
                                    <option value="BILL_NO">Bill No</option>
                                </select>
                            </div>
                            <div>
                                <label>Reason for Blocking</label>
                                <input type="text" id="blockReason" placeholder="e.g. Pending payment">
                            </div>
                            <button onclick="blockEntity()" class="btn-danger mt-1">
                                <i data-lucide="shield-ban"></i> Block Now
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Blocked List -->
                <div class="card" style="flex: 2; min-width: 350px; margin-bottom: 0;">
                    <h3 style="margin-top: 0; display: flex; align-items: center; gap: 8px;">
                        <i data-lucide="shield-alert" style="color: var(--warning);"></i> Active Blocks
                    </h3>
                    <div id="blockList" style="margin-top: 15px;">
                        <!-- JS injects blocks here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Inject Modal Template -->
    <div id="customModal" class="modal-overlay"><div class="modal-box"><div class="modal-header"><h3 id="modalTitle"></h3></div><div class="modal-body"><p id="modalMessage"></p><input type="text" id="modalInput" style="display:none;"></div><div class="modal-footer"><button id="modalBtnCancel" class="btn-outline" style="display:none;" onclick="closeModal(false)">Cancel</button><button id="modalBtnConfirm" class="btn-primary" onclick="closeModal(true)">OK</button></div></div></div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/settings.js"></script>
    <script>
        // Security Check: Kick out non-admins immediately
        checkAuth();
        if(localStorage.getItem('role') !== 'ADMIN') {
            window.location.href = '/single.html';
        }

        document.getElementById('roleBadge').innerText = localStorage.getItem('role');
        
        window.onload = () => { 
            lucide.createIcons();
            loadSettings(); 
        };
    </script>
</body>
</html>
