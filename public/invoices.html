<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices - Bahar Service Station</title>
    <link href="/css/global.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .alert-box {
            background: #fff1f2; color: var(--danger-dark); border: 1px solid #fecaca;
            padding: 15px; border-radius: 8px; margin-bottom: 20px;
            display: flex; align-items: flex-start; gap: 15px;
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <button class="mobile-toggle" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
            <i data-lucide="fuel" style="color: var(--primary); width: 28px; height: 28px;"></i>
            <h1 style="display: inline-block;">BAHAR SERVICE STATION</h1>
            <span id="roleBadge" class="badge badge-info" style="margin-left:10px;"></span>
        </div>
        <button onclick="logout()" class="btn-danger"><i data-lucide="log-out"></i> Logout</button>
    </header>
    
    <div class="app-body">
        <nav class="sidebar" id="appSidebar">
            <a href="/single.html"><i data-lucide="file-plus-2"></i> Single Entry</a>
            <a href="/batch.html"><i data-lucide="layers"></i> Batch Entry (50)</a>
            <a href="/summary.html"><i data-lucide="list-checks"></i> View Bills & Integrity</a>
            <a href="/invoices.html" class="active"><i data-lucide="receipt"></i> Invoices</a>
            <a href="/admin.html" id="adminTabBtn" style="display:none;"><i data-lucide="settings"></i> Admin Panel</a>
        </nav>

        <main class="content">
            <h2>Invoice & Collection Manager</h2>
            
            <div id="leftoverAlert" class="alert-box" style="display: none;"></div>

            <div class="card">
                <div style="margin-bottom: 1.5rem; display: flex; gap: 10px;">
                    <button id="tabDate" class="btn-primary" onclick="setGenerateMode('date')">Generate by Date</button>
                    <button id="tabBill" class="btn-outline" onclick="setGenerateMode('bill')">Generate by Bill No</button>
                </div>

                <div id="dateInputs" style="display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap;">
                    <div><label>Start Date</label><input type="date" id="invStartDate"></div>
                    <div><label>End Date</label><input type="date" id="invEndDate"></div>
                </div>

                <div id="billInputs" style="display: none; gap: 1rem; align-items: flex-end; flex-wrap: wrap;">
                    <div><label>Start Bill No</label><input type="number" id="invStartBill" placeholder="e.g. 101"></div>
                    <div><label>End Bill No</label><input type="number" id="invEndBill" placeholder="e.g. 150"></div>
                </div>

                <button id="generateBtn" onclick="generateInvoice()" class="btn-primary mt-1">
                    <i data-lucide="file-check-2"></i> Generate Invoice
                </button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>Invoice No</th><th>Billing Period / Range</th><th>Total Amount</th><th>Collected</th><th>Status</th><th>Action</th></tr>
                    </thead>
                    <tbody id="invoiceTableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="customModal" class="modal-overlay"><div class="modal-box"><div class="modal-header"><h3 id="modalTitle"></h3></div><div class="modal-body"><p id="modalMessage"></p><input type="text" id="modalInput" style="display:none;"></div><div class="modal-footer"><button id="modalBtnCancel" class="btn-outline" style="display:none;" onclick="closeModal(false)">Cancel</button><button id="modalBtnConfirm" class="btn-primary" onclick="closeModal(true)">OK</button></div></div></div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/invoices.js"></script>
    <script>
        checkAuth();
        lucide.createIcons();
        document.getElementById('roleBadge').innerText = localStorage.getItem('role');
        if(localStorage.getItem('role') === 'ADMIN') document.getElementById('adminTabBtn').style.display = 'flex';
        
        window.onload = () => { initInvoices(); };
    </script>
</body>
</html>
